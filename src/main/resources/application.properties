spring.application.name=caims

# ==========================
# SERVER CONFIGURATION
# ==========================
server.port=8081

# ==========================
# DATABASE CONFIGURATION
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/caims_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA CONFIGURATION
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================
# THYMELEAF
# ==========================
spring.thymeleaf.cache=false

# ==========================
# LOGGING
# ==========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.com.countyassembly.caims.security=DEBUG
logging.level.com.countyassembly.caims.auth=DEBUG

#  for local development
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Session Cookie Security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=15m
server.servlet.session.tracking-modes=COOKIE

