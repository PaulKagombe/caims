<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Category Management | CAIMS</title>
</head>

<body>

<div th:replace="~{fragments/layout :: body(content=~{::content})}">

    <div th:fragment="content">

        <!-- ================= PAGE HEADER ================= -->

        <div class="page-header">

            <div>

                <h1>Category Management</h1>

                <p class="page-subtitle">
                    Manage inventory categories used throughout the system.
                </p>

            </div>

            <a th:href="@{/categories/new}" class="btn btn-primary">

                <i class="bi bi-plus-circle"></i>

                Add Category

            </a>

        </div>

        <!-- Success Message -->

        <div th:if="${success}"
             class="alert alert-success alert-dismissible fade show">

            <span th:text="${success}"></span>

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"></button>

        </div>

        <!-- Error Message -->

        <div th:if="${error}"
             class="alert alert-danger alert-dismissible fade show">

            <span th:text="${error}"></span>

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"></button>

        </div>

        <!-- Search -->

        <div class="search-container">

            <form th:action="@{/categories}" method="get">

                <input
                        type="text"
                        name="keyword"
                        class="form-control"
                        placeholder="Search categories..."
                        th:value="${keyword}">

                <button class="btn btn-primary">

                    <i class="bi bi-search"></i>

                    Search

                </button>

            </form>

        </div>

        <!-- Categories Table -->

        <div class="table-card">

            <table class="table">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th width="150">Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="category : ${categories}">

                    <td th:text="${category.id}"></td>

                    <td th:text="${category.name}"></td>

                    <td th:text="${category.description}"></td>

                    <td>

                        <span th:if="${category.active}"
                              class="badge badge-active">

                            Active

                        </span>

                        <span th:unless="${category.active}"
                              class="badge badge-inactive">

                            Inactive

                        </span>

                    </td>

                    <td>

                        <a th:href="@{/categories/edit/{id}(id=${category.id})}"
                           class="btn btn-warning btn-sm">

                            <i class="bi bi-pencil-square"></i>

                        </a>

                        <!-- Delete is a POST form (not a plain link) so link
                             prefetching/crawlers can't trigger a deletion. -->
                        <form th:action="@{/categories/delete/{id}(id=${category.id})}"
                              method="post"
                              class="d-inline"
                              onsubmit="return confirm('Delete this category?')">

                            <button type="submit" class="btn btn-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </button>

                        </form>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(categories)}">

                    <td colspan="5">

                        <div class="empty-state">

                            <i class="bi bi-folder empty-state-icon"></i>

                            <h4>No Categories Found</h4>

                            <p>Create your first category to get started.</p>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

            <!-- Pagination -->

            <nav th:if="${categoryPage.totalPages > 1}" aria-label="Category pagination">

                <ul class="pagination justify-content-center mt-3">

                    <li class="page-item"
                        th:classappend="${categoryPage.first} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/categories(keyword=${keyword}, page=${categoryPage.number - 1})}">

                            Previous

                        </a>

                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, categoryPage.totalPages - 1)}"
                        th:classappend="${i == categoryPage.number} ? 'active'">

                        <a class="page-link"
                           th:href="@{/categories(keyword=${keyword}, page=${i})}"
                           th:text="${i + 1}">

                        </a>

                    </li>

                    <li class="page-item"
                        th:classappend="${categoryPage.last} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/categories(keyword=${keyword}, page=${categoryPage.number + 1})}">

                            Next

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </div>

</div>

</body>

</html>
