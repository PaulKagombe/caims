<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Reports | CAIMS</title>
</head>

<body>

<div th:replace="~{fragments/layout :: body(content=~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h1>Reports</h1>
                <p class="page-subtitle">Audit trails and inventory reports.</p>
            </div>
        </div>

        <div class="row g-4">

            <div class="col-lg-3 col-md-6">
                <a th:href="@{/reports/stock-movements}" class="text-decoration-none">
                    <div class="card activity-card h-100">
                        <div class="card-body text-center py-5">
                            <i class="bi bi-arrow-left-right" style="font-size: 2.5rem; color: var(--primary);"></i>
                            <h5 class="mt-3 mb-1">Stock Movements</h5>
                            <p class="text-muted mb-0">Combined Stock In / Out audit trail</p>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-lg-3 col-md-6">
                <a th:href="@{/reports/purchase-orders}" class="text-decoration-none">
                    <div class="card activity-card h-100">
                        <div class="card-body text-center py-5">
                            <i class="bi bi-file-earmark-text" style="font-size: 2.5rem; color: var(--primary);"></i>
                            <h5 class="mt-3 mb-1">Purchase Orders</h5>
                            <p class="text-muted mb-0">Order history by status and supplier</p>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-lg-3 col-md-6">
                <a th:href="@{/reports/low-stock}" class="text-decoration-none">
                    <div class="card activity-card h-100">
                        <div class="card-body text-center py-5">
                            <i class="bi bi-exclamation-triangle" style="font-size: 2.5rem; color: var(--warning);"></i>
                            <h5 class="mt-3 mb-1">Low Stock</h5>
                            <p class="text-muted mb-0">Materials at or below reorder level</p>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-lg-3 col-md-6">
                <a th:href="@{/reports/inventory-valuation}" class="text-decoration-none">
                    <div class="card activity-card h-100">
                        <div class="card-body text-center py-5">
                            <i class="bi bi-cash-stack" style="font-size: 2.5rem; color: var(--success);"></i>
                            <h5 class="mt-3 mb-1">Inventory Valuation</h5>
                            <p class="text-muted mb-0">Current stock value by material</p>
                        </div>
                    </div>
                </a>
            </div>

        </div>

    </div>

</div>

</body>

</html>
