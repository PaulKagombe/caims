<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="${supplier.id == null} ? 'Add Supplier' : 'Edit Supplier'">Supplier</title>
</head>

<body>

<div th:replace="~{fragments/layout :: body(content=~{::content})}">

    <div th:fragment="content">
        <div class="container mt-5">
            <div class="card shadow">
                <div class="card-header">
                    <h3 th:text="${supplier.id == null} ? 'Add Supplier' : 'Edit Supplier'">Supplier</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Supplier Name</label>
                            <input type="text" class="form-control" th:field="*{name}">
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contact Person</label>
                                <input type="text" class="form-control" th:field="*{contactPerson}">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('contactPerson')}" th:errors="*{contactPerson}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" class="form-control" th:field="*{phoneNumber}">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}">
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" rows="2" th:field="*{address}"></textarea>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" th:field="*{active}">
                            <label class="form-check-label">Active</label>
                        </div>

                        <button class="btn btn-primary">
                            <i class="bi bi-save"></i>
                            Save
                        </button>
                        <a th:href="@{/suppliers}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

</body>

</html>
