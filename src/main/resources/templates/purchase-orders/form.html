<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>New Purchase Order | CAIMS</title>
</head>

<body>

<div th:replace="~{fragments/layout :: body(content=~{::content})}">

    <div th:fragment="content">
        <div class="container mt-5">
            <div class="card shadow">
                <div class="card-header">
                    <h3>New Purchase Order</h3>
                </div>
                <div class="card-body">

                    <form th:action="@{/purchase-orders/save}" th:object="${purchaseOrder}" method="post">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Material</label>
                                <select name="materialId" class="form-control">
                                    <option value="">Select a material...</option>
                                    <option th:each="m : ${materials}"
                                            th:value="${m.id}"
                                            th:text="${m.code + ' — ' + m.name}">
                                    </option>
                                </select>
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('material')}" th:errors="*{material}"></div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Supplier</label>
                                <select name="supplierId" class="form-control">
                                    <option value="">Select a supplier...</option>
                                    <option th:each="s : ${suppliers}"
                                            th:value="${s.id}"
                                            th:text="${s.name}">
                                    </option>
                                </select>
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('supplier')}" th:errors="*{supplier}"></div>
                            </div>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" min="1" class="form-control" th:field="*{quantity}">
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" rows="3" th:field="*{notes}"></textarea>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></div>
                        </div>

                        <button class="btn btn-primary">
                            <i class="bi bi-save"></i>
                            Submit for Approval
                        </button>
                        <a th:href="@{/purchase-orders}" class="btn btn-secondary">Cancel</a>

                    </form>

                </div>
            </div>
        </div>
    </div>

</div>

</body>

</html>
