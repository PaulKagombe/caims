<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="scripts">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Guarded: #sidebarOffcanvas doesn't exist in the current markup.
            var sidebarOffcanvasEl = document.getElementById("sidebarOffcanvas");

            if (sidebarOffcanvasEl) {
                var sidebarOffcanvas = new bootstrap.Offcanvas(sidebarOffcanvasEl);
            }
        });
    </script>
    <script>

        const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        };

        // Guarded: no #currentDate element exists on every page.
        const currentDateEl = document.getElementById("currentDate");

        if (currentDateEl) {
            currentDateEl.innerHTML = new Date().toLocaleDateString('en-GB', options);
        }

    </script>

</div>

</body>

</html>
