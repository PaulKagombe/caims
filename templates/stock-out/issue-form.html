<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Log Stock Issue | CAIMS</title>
</head>

<body>

<div th:replace="~{fragments/layout :: body(content=~{::content})}">

    <div th:fragment="content">
        <div class="container mt-5">
            <div class="card shadow">
                <div class="card-header">
                    <h3>Log Stock Issue</h3>
                </div>
                <div class="card-body">

                    <div th:if="${error}"
                         class="alert alert-danger alert-dismissible fade show">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Scan Barcode</label>
                        <input type="text" id="barcodeInput" class="form-control"
                               placeholder="Scan an item, or type its code and press Enter"
                               autocomplete="off" autofocus>
                        <div id="barcodeStatus" class="form-text"></div>
                    </div>

                    <form th:action="@{/stock-out/save}" th:object="${stockOut}" method="post">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Material</label>
                                <select id="materialSelect" name="materialId" class="form-control">
                                    <option value="">Select a material...</option>
                                    <option th:each="m : ${materials}"
                                            th:value="${m.id}"
                                            th:text="${m.code + ' — ' + m.name}"
                                            th:attr="data-code=${m.code},data-barcode=${m.barcode}">
                                    </option>
                                </select>
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('material')}" th:errors="*{material}"></div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Department</label>
                                <select name="departmentId" class="form-control">
                                    <option value="">Select a department...</option>
                                    <option th:each="d : ${departments}"
                                            th:value="${d.id}"
                                            th:text="${d.name}">
                                    </option>
                                </select>
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Requester's Name</label>
                                <input type="text" class="form-control" th:field="*{requesterName}"
                                       placeholder="e.g. Paul">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('requesterName')}" th:errors="*{requesterName}"></div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Quantity</label>
                                <input type="number" min="1" class="form-control" th:field="*{quantity}">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                            </div>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" rows="2" th:field="*{notes}"></textarea>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></div>
                        </div>

                        <button class="btn btn-primary">
                            <i class="bi bi-box-arrow-up"></i>
                            Issue Stock
                        </button>
                        <a th:href="@{/stock-out}" class="btn btn-secondary">Cancel</a>

                    </form>

                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // A barcode scanner behaves like a very fast keyboard: it types the
    // code and then sends Enter. No special hardware API is needed —
    // this just listens for Enter on a plain text input and matches
    // the scanned value against each material's code/barcode.
    document.addEventListener("DOMContentLoaded", function () {

        const barcodeInput = document.getElementById("barcodeInput");
        const materialSelect = document.getElementById("materialSelect");
        const status = document.getElementById("barcodeStatus");

        if (!barcodeInput || !materialSelect) {
            return;
        }

        barcodeInput.addEventListener("keydown", function (e) {

            if (e.key !== "Enter") {
                return;
            }

            e.preventDefault();

            const scanned = barcodeInput.value.trim().toLowerCase();

            if (!scanned) {
                return;
            }

            let matched = false;

            for (const option of materialSelect.options) {

                const code = (option.dataset.code || "").toLowerCase();
                const barcode = (option.dataset.barcode || "").toLowerCase();

                if (code === scanned || (barcode && barcode === scanned)) {

                    materialSelect.value = option.value;
                    matched = true;

                    status.textContent = "Matched: " + option.textContent.trim();
                    status.className = "form-text text-success";

                    break;
                }
            }

            if (!matched) {
                status.textContent = "No material found for '" + barcodeInput.value.trim() + "'. Select it manually below.";
                status.className = "form-text text-danger";
            }

            barcodeInput.value = "";
        });

    });
</script>

</body>

</html>
