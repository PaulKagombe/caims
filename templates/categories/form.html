<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="${category.id == null} ? 'Add Category' : 'Edit Category'">
        Category
    </title>
</head>
<body>
<div th:replace="~{fragments/layout :: body(content=~{::content})}">
    <div th:fragment="content">
        <div class="container mt-5">
            <div class="card shadow">
                <div class="card-header">
                    <h3 th:text="${category.id == null} ? 'Add Category' : 'Edit Category'">
                        Category
                    </h3>
                </div>
                <div class="card-body">

                    <div th:if="${error}"
                         class="alert alert-danger alert-dismissible fade show">
                        <span th:text="${error}"></span>
                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/categories/save}"
                          th:object="${category}"
                          method="post">
                        <!-- Hidden ID (used during editing) -->
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label class="form-label">
                                Category Name
                            </label>
                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{name}"
                                    required>
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Description
                            </label>
                            <textarea
                                    class="form-control"
                                    rows="4"
                                    th:field="*{description}">
                            </textarea>
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}">
                            </div>
                        </div>
                        <div class="form-check mb-4">
                            <input
                                    class="form-check-input"
                                    type="checkbox"
                                    th:field="*{active}">
                            <label class="form-check-label">
                                Active
                            </label>
                        </div>
                        <button
                                class="btn btn-primary">
                            <i class="bi bi-save"></i>
                            Save
                        </button>
                        <a
                                th:href="@{/categories}"
                                class="btn btn-secondary">
                            Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
