<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="scripts">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/sidebar.js}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Guarded: #sidebarOffcanvas doesn't exist in the current markup.
            // Bootstrap 5.3's constructor is null-safe, but we check explicitly
            // so it's clear this is intentionally inactive until the markup
            // (and a trigger button) is added.
            var sidebarOffcanvasEl = document.getElementById("sidebarOffcanvas");

            if (sidebarOffcanvasEl) {
                var sidebarOffcanvas = new bootstrap.Offcanvas(sidebarOffcanvasEl);

                // document.getElementById("sidebarToggle").addEventListener("click", function() {
                //     sidebarOffcanvas.toggle();
                // });
            }
        });
    </script>
    <script>

        const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        };

        // Guarded: no #currentDate element exists on every page, so this
        // must not assume one is present (was previously throwing a
        // TypeError on every page load).
        const currentDateEl = document.getElementById("currentDate");

        if (currentDateEl) {
            currentDateEl.innerHTML = new Date().toLocaleDateString('en-GB', options);
        }

    </script>

</div>

</body>

</html>
