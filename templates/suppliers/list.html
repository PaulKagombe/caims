<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Supplier Management | CAIMS</title>
</head>

<body>

<div th:replace="~{fragments/layout :: body(content=~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h1>Supplier Management</h1>
                <p class="page-subtitle">Suppliers materials are ordered from.</p>
            </div>
            <a th:href="@{/suppliers/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i>
                Add Supplier
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="table-card">
            <table class="table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Contact Person</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th width="150">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${suppliers}">
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.contactPerson}"></td>
                    <td th:text="${s.phoneNumber}"></td>
                    <td th:text="${s.email}"></td>
                    <td>
                        <span th:if="${s.active}" class="badge badge-active">Active</span>
                        <span th:unless="${s.active}" class="badge badge-inactive">Inactive</span>
                    </td>
                    <td>
                        <a th:href="@{/suppliers/edit/{id}(id=${s.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                        <form th:action="@{/suppliers/delete/{id}(id=${s.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Deactivate this supplier?')">
                            <button type="submit" class="btn btn-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(suppliers)}">
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="bi bi-truck empty-state-icon"></i>
                            <h4>No Suppliers Found</h4>
                            <p>Add your first supplier to get started.</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

</body>

</html>
