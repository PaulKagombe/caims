<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Department Management | CAIMS</title>
</head>

<body>

<div th:replace="~{fragments/layout :: body(content=~{::content})}">

    <div th:fragment="content">

        <div class="page-header">
            <div>
                <h1>Department Management</h1>
                <p class="page-subtitle">Departments that can request and receive stock.</p>
            </div>
            <a th:href="@{/departments/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i>
                Add Department
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="table-card">
            <table class="table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th width="150">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${departments}">
                    <td th:text="${d.name}"></td>
                    <td th:text="${d.description}"></td>
                    <td>
                        <span th:if="${d.active}" class="badge badge-active">Active</span>
                        <span th:unless="${d.active}" class="badge badge-inactive">Inactive</span>
                    </td>
                    <td>
                        <a th:href="@{/departments/edit/{id}(id=${d.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                        <form th:action="@{/departments/delete/{id}(id=${d.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Deactivate this department?')">
                            <button type="submit" class="btn btn-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(departments)}">
                    <td colspan="4">
                        <div class="empty-state">
                            <i class="bi bi-building empty-state-icon"></i>
                            <h4>No Departments Found</h4>
                            <p>Add your first department to get started.</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

</body>

</html>
