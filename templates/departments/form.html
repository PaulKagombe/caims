<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title th:text="${department.id == null} ? 'Add Department' : 'Edit Department'">Department</title>
</head>

<body>

<div th:replace="~{fragments/layout :: body(content=~{::content})}">

    <div th:fragment="content">
        <div class="container mt-5">
            <div class="card shadow">
                <div class="card-header">
                    <h3 th:text="${department.id == null} ? 'Add Department' : 'Edit Department'">Department</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/departments/save}" th:object="${department}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Department Name</label>
                            <input type="text" class="form-control" th:field="*{name}">
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" th:field="*{active}">
                            <label class="form-check-label">Active</label>
                        </div>

                        <button class="btn btn-primary">
                            <i class="bi bi-save"></i>
                            Save
                        </button>
                        <a th:href="@{/departments}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

</body>

</html>
